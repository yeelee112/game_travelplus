<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { background:#0f172a; color:white; font-family:sans-serif; text-align:center; }
h1 { font-size:50px; }
.rank { padding:10px; margin:5px; background:#1e293b; border-radius:10px; }
.top1 { background:gold; color:black; }
.top2 { background:silver; color:black; }
.top3 { background:#cd7f32; }
button { padding:15px 30px; font-size:20px; cursor:pointer; }
</style>
</head>

<body>

<h1>🎮 Câu <span id="qnum">1</span></h1>
<h2>🏆 Nhanh nhất</h2>

<div id="list"></div>

<button onclick="nextQuestion()">➡ NEXT</button>

<script>
const sb = window.supabase.createClient(
  "https://uqmiaknrfrybkgiscadv.supabase.co",
  "sb_publishable_W1QYKpvgiJGueoG6lSbwPw_u_nrN4PS"
)

let currentQuestion = 1
let answers = []

function render(){
  answers.sort((a,b)=>a.answer_time-b.answer_time)

  const list = document.getElementById("list")
  list.innerHTML=""

  answers.forEach((a,i)=>{
    const div = document.createElement("div")
    div.className = "rank " + (i==0?"top1":i==1?"top2":i==2?"top3":"")
    div.innerText = `${i+1}. ${a.player_name} - ${a.answer} (${a.answer_time} ms)`
    list.appendChild(div)
  })
}

// realtime answers
sb.channel('answers_channel')
.on('postgres_changes',{
  event:'INSERT',
  schema:'public',
  table:'answers'
},payload=>{
  if(payload.new.question_id === currentQuestion){
    answers.push(payload.new)
    render()
  }
})
.subscribe()

async function nextQuestion(){

  // 🔥 LẤY GIÁ TRỊ TỪ DB
  const { data, error: fetchError } = await sb
    .from('game_state')
    .select('current_question')
    .eq('id',1)
    .single()

  if(fetchError){
    console.error(fetchError)
    return
  }

  const newQuestion = data.current_question + 1

  // 🔥 UPDATE DB
  const { error } = await sb
    .from('game_state')
    .update({ current_question: newQuestion })
    .eq('id',1)

  if(error){
    console.error(error)
    return
  }

  // 🔥 SYNC UI
  currentQuestion = newQuestion
  answers = []

  document.getElementById("qnum").innerText = currentQuestion
  document.getElementById("list").innerHTML=""

  if(currentQuestion > 30){
    document.body.innerHTML = "<h1>🎉 HOÀN THÀNH!</h1>"
  }
}
</script>

</body>
</html>

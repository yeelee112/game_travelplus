<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Player</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  background:#020617;
  color:white;
  text-align:center;
  font-family:sans-serif;
}

.container {
  margin-top:50px;
}

input {
  padding:10px;
  font-size:18px;
  margin:5px;
}

button {
  padding:15px;
  font-size:20px;
  cursor:pointer;
  margin-top:10px;
}

.hidden {
  display:none;
}
</style>
</head>

<body>

<div class="container">

  <!-- NHẬP TÊN -->
  <div id="login">
    <h2>👤 Nhập tên của bạn</h2>
    <input id="nameInput" placeholder="Tên của bạn">
    <br>
    <button onclick="startGame()">Bắt đầu</button>
  </div>

  <!-- GAME -->
  <div id="game" class="hidden">
    <h2>🎮 Câu <span id="qnum">1</span></h2>

    <input id="answer" placeholder="Nhập câu trả lời"><br>
    <button id="btn" onclick="submit()">Gửi</button>

    <p id="status"></p>
  </div>

</div>

<script>
const sb = window.supabase.createClient(
  "https://uqmiaknrfrybkgiscadv.supabase.co",
  "sb_publishable_W1QYKpvgiJGueoG6lSbwPw_u_nrN4PS"
)

// ===== STATE =====
let name = localStorage.getItem("name") || ""
let id = localStorage.getItem("id") || crypto.randomUUID()

localStorage.setItem("id", id)

let currentQuestion = 1
let hasAnswered = false
let startTime = Date.now()

// ===== START GAME =====
function startGame(){
  const input = document.getElementById("nameInput").value.trim()

  if(!input){
    alert("Vui lòng nhập tên!")
    return
  }

  name = input
  localStorage.setItem("name", name)

  document.getElementById("login").classList.add("hidden")
  document.getElementById("game").classList.remove("hidden")
}

// nếu đã có name thì vào thẳng game
if(name){
  document.getElementById("login").classList.add("hidden")
  document.getElementById("game").classList.remove("hidden")
}

// ===== SUBMIT =====
async function submit(){
  if(hasAnswered) return

  hasAnswered = true

  const answer = document.getElementById("answer").value

  const { error } = await sb.from('answers').insert({
    player_id:id,
    player_name:name,
    question_id:currentQuestion,
    answer:answer,
    answer_time:Date.now()-startTime
  })

  if(error){
    if(error.code === '23505'){
      console.log('Đã trả lời rồi')
      return
    }
    console.error(error)
  }

  document.getElementById("btn").disabled = true
  document.getElementById("status").innerText = "✅ Đã gửi!"
}

// ===== REALTIME =====
sb.channel('game_state_channel')
.on('postgres_changes',{
  event:'UPDATE',
  schema:'public',
  table:'game_state'
},payload=>{
  console.log("REALTIME:", payload)

  currentQuestion = payload.new.current_question

  document.getElementById("qnum").innerText = currentQuestion
  document.getElementById("answer").value = ""
  document.getElementById("btn").disabled = false
  document.getElementById("status").innerText = ""

  hasAnswered = false
  startTime = Date.now()
})
.subscribe()
</script>

</body>
</html>

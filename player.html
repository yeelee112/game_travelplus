<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">

<!-- 🔥 QUAN TRỌNG -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Player</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
  * {
  box-sizing: border-box;
}
body {
  background:#020617;
  color:white;
  text-align:center;
  font-family:sans-serif;
  margin:0;
  padding:20px;
}

.container {
  max-width:500px;
  margin:auto;
}

h2 {
  font-size:28px;
}

input {
  width:100%;
  padding:15px;
  font-size:18px;
  border-radius:10px;
  border:none;
  margin-top:10px;
}

button {
  width:100%;
  padding:18px;
  font-size:20px;
  border:none;
  border-radius:10px;
  margin-top:15px;
  background:#3b82f6;
  color:white;
}

button:disabled {
  background:#555;
}

.hidden {
  display:none;
}
</style>
</head>

<body>

<div class="container">

  <!-- LOGIN -->
  <div id="login">
    <h2>👤 Nhập tên</h2>
    <input id="nameInput" placeholder="Tên của bạn">
    <button onclick="startGame()">Bắt đầu</button>
  </div>

  <!-- GAME -->
  <div id="game" class="hidden">
    <h2>🎮 Câu <span id="qnum">1</span></h2>

    <input id="answer" placeholder="Nhập câu trả lời">
    <button id="btn" onclick="submit()">Gửi</button>

    <p id="status"></p>
  </div>

</div>

<script>
const sb = window.supabase.createClient(
  "https://uqmiaknrfrybkgiscadv.supabase.co",
  "sb_publishable_W1QYKpvgiJGueoG6lSbwPw_u_nrN4PS"
)

let name = localStorage.getItem("name") || ""
let id = localStorage.getItem("id") || crypto.randomUUID()

localStorage.setItem("id", id)

let currentQuestion = 1
let hasAnswered = false
let startTime = Date.now()

function startGame(){
  const input = document.getElementById("nameInput").value.trim()

  if(!input){
    alert("Nhập tên đi 😄")
    return
  }

  name = input
  localStorage.setItem("name", name)

  document.getElementById("login").classList.add("hidden")
  document.getElementById("game").classList.remove("hidden")
}

if(name){
  document.getElementById("login").classList.add("hidden")
  document.getElementById("game").classList.remove("hidden")
}

async function submit(){
  if(hasAnswered) return

  hasAnswered = true

  const answer = document.getElementById("answer").value

  await sb.from('answers').insert({
    player_id:id,
    player_name:name,
    question_id:currentQuestion,
    answer:answer,
    answer_time:Date.now()-startTime
  })

  document.getElementById("btn").disabled = true
  document.getElementById("status").innerText = "✅ Đã gửi!"
}

// realtime
sb.channel('game_state_channel')
.on('postgres_changes',{
  event:'UPDATE',
  schema:'public',
  table:'game_state'
},payload=>{
  currentQuestion = payload.new.current_question

  document.getElementById("qnum").innerText = currentQuestion
  document.getElementById("answer").value=""
  document.getElementById("btn").disabled=false
  document.getElementById("status").innerText=""

  hasAnswered=false
  startTime=Date.now()
})
.subscribe()
</script>

</body>
</html>
